name: Build & Release FuckTomato APK

# 触发方式
on:
  push:
    branches: [main, master]
  workflow_dispatch: # 手动一键触发

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true # 重复构建自动取消旧任务

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 拉取源码
        uses: actions/checkout@v4
        fetch-depth: 0

      - name: 配置JDK17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: 赋予脚本权限
        run: chmod +x gradlew

      - name: 清理旧构建缓存
        run: ./gradlew clean

      - name: 编译正式Release无签名APK
        run: ./gradlew assembleRelease --parallel

      - name: 上传成品到 Releases v1.0
        uses: softprops/action-gh-release@v1
        with:
          tag_name: 1.0
          name: 正式版 V1.0
          body: |
            自动CI编译打包
            编译环境：Ubuntu + JDK17
            构建类型：Release正式包
          files: |
            app/build/outputs/apk/release/app-release-unsigned.apk
          overwrite: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
